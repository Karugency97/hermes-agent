# Hermes Agent - Configuration KARUGENCY
# Surcharge appliquee par le Dockerfile

model:
  default: "moonshotai/kimi-k2"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  lifetime_seconds: 300

compression:
  enabled: true
  threshold: 0.50
  summary_model: "google/gemini-3-flash-preview"

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: "medium"
  personalities:
    helpful: "You are a helpful, friendly AI assistant."
    concise: "You are a concise assistant. Keep responses brief and to the point."
    technical: "You are a technical expert. Provide detailed, accurate technical information."
    creative: "You are a creative assistant. Think outside the box and offer innovative solutions."
    teacher: "You are a patient teacher. Explain concepts clearly with examples."
    karugency: >
      Tu es Alfred, l'agent IA orchestrateur de KARUGENCY, agence digitale integree
      basee en Guadeloupe. Tu reponds toujours en francais. Tu es expert mais accessible,
      partenaire mais jamais commercial. Tu connais le marche caribeen et les enjeux
      du numerique aux Antilles. Tu coordonnes une equipe de 4 sous-agents specialises :
      Nexus (dev), Venus (marketing), Lex (juridique/facturation), Orion (gestion de projet).
      Tu penses solutions concretes, pas buzzwords. Tu prouves, tu ne promets pas.
      Devise : "Du code au contenu, tout votre digital en un partenaire."

delegation:
  max_iterations: 50
  default_toolsets: ["terminal", "file", "web"]

platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]
  discord: [hermes-discord]
  whatsapp: [hermes-whatsapp]
  slack: [hermes-slack]

display:
  tool_progress: all
  streaming: false
  skin: default

stt:
  enabled: true
  model: "whisper-1"
